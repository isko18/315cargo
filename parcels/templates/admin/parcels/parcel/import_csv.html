{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
  <h1>{{ title }}</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" class="default" value="{% trans 'Импортировать' %}" />
    <a href="{% url 'admin:parcels_parcel_changelist' %}" class="button cancel-link">
      {% trans 'Отмена' %}
    </a>
  </form>
{% endblock %}
